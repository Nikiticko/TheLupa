<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Плейлист жизни</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="screen screen-home is-active" data-screen="home">
        <button class="hotspot start-button" type="button" data-open="menu">
          <span>нажми</span>
        </button>
      </section>

      <section class="screen screen-menu" data-screen="menu">
        <button class="nav-button back-button" type="button" data-open="home" aria-label="Назад">
          ‹
        </button>

        <div class="menu-collage" aria-hidden="true">
          <img class="menu-piece menu-piece-stars" src="assets/images/image 29.png" alt="" />
          <img class="menu-piece menu-piece-hand" src="assets/images/image 32.png" alt="" />
          <img class="menu-piece menu-piece-dice-big" src="assets/images/кубы.png" alt="" />
          <img class="menu-piece menu-piece-dice-small" src="assets/images/куб.png" alt="" />
          <img class="menu-piece menu-piece-note-left" src="assets/images/image 67.png" alt="" />
          <img class="menu-piece menu-piece-racket" src="assets/images/image 168.png" alt="" />
          <img class="menu-piece menu-piece-cats" src="assets/images/кот.png" alt="" />
          <img class="menu-piece menu-piece-paper" src="assets/images/image 154.png" alt="" />
          <img class="menu-piece menu-piece-books" src="assets/images/image 155.png" alt="" />
          <img class="menu-piece menu-piece-shoes" src="assets/images/image 157.png" alt="" />
          <img class="menu-piece menu-piece-statue" src="assets/images/image 70.png" alt="" />
          <img class="menu-piece menu-piece-flowers" src="assets/images/image 41.png" alt="" />
          <img class="menu-piece menu-piece-clothes" src="assets/images/image 172.png" alt="" />
          <img class="menu-piece menu-piece-plant" src="assets/images/image 176.png" alt="" />
          <img class="menu-piece menu-piece-car" src="assets/images/машина.png" alt="" />
          <img class="menu-piece menu-piece-vending" src="assets/images/image 167.png" alt="" />
        </div>

        <div class="playlist-grid" aria-label="Выбор плейлиста">
          <button class="playlist-button" type="button" data-playlist="Солнечное детство">
            Солнечное детство
          </button>
          <button class="playlist-button" type="button" data-playlist="Школьный звонок">
            Школьный звонок
          </button>
          <button class="playlist-button" type="button" data-playlist="Уютная зима">
            Уютная зима
          </button>
          <button class="playlist-button" type="button" data-playlist="Ретро-радио">
            Ретро-радио
          </button>
          <button class="playlist-button" type="button" data-playlist="Неоновый город">
            Неоновый город
          </button>
          <button class="playlist-button" type="button" data-playlist="Купе на четверых">
            Купе на четверых
          </button>
        </div>
      </section>

      <section class="screen screen-player" data-screen="player">
        <button class="nav-button player-back" type="button" data-open="menu" aria-label="К выбору">
          ‹
        </button>
        <div class="record-layer" aria-hidden="true"></div>
        <div class="tonearm-layer" aria-hidden="true"></div>

        <article class="player-panel">
          <p class="eyebrow">выбранный плейлист</p>
          <h1 id="playlistTitle">Солнечное детство</h1>
          <p id="playlistMood">Теплая подборка воспоминаний и ярких моментов.</p>
          <dl class="sound-map" id="soundMap"></dl>

          <div class="progress" aria-label="Прогресс трека">
            <span></span>
          </div>

          <p class="audio-status" id="audioStatus">Аудио пока не добавлено</p>
          <audio id="audioPlayer" preload="metadata"></audio>

          <div class="controls" aria-label="Управление плеером">
            <button type="button" data-action="prev" aria-label="Предыдущий трек">‹</button>
            <button class="play-toggle" type="button" aria-label="Пауза">Ⅱ</button>
            <button type="button" data-action="next" aria-label="Следующий трек">›</button>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
